<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>W krainie genetyki — Ogłoszenia</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>W krainie genetyki</h1>
    <p>Ogłoszenia: konferencje, szkolenia, webinary i nowinki.</p>
  </header>

  <main>
    <section id="list">
      <h2>Lista ogłoszeń</h2>
      <input id="search" placeholder="Szukaj..." />
      <div id="items"></div>
    </section>

    <section id="content">
      <h2 id="item-title">Wybierz ogłoszenie</h2>
      <div id="item-meta"></div>
      <article id="item-body"></article>
    </section>
  </main>

  <footer>
    <small>Repozytorium: W krainie genetyki</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
